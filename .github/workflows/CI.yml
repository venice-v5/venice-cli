name: CI

on: [push]

permissions:
  contents: read
jobs:
  linux:
      runs-on: ${{ matrix.platform.runner }}
      strategy:
        matrix:
          platform:
            - runner: ubuntu-22.04
              target: x86_64
            - runner: ubuntu-22.04
              target: x86
            - runner: ubuntu-22.04
              target: aarch64
            - runner: ubuntu-22.04
              target: armv7
            - runner: ubuntu-22.04
              target: s390x
            - runner: ubuntu-22.04
              target: ppc64le
      steps:
        - uses: actions/checkout@v4

        - name: Set up QEMU
          uses: docker/setup-qemu-action@v3

        - uses: actions/setup-python@v5
          with:
            python-version: "3.12" # 👈 FIXED: Pin to 3.12 to avoid Python 3.14 alpha issues

        - name: Build wheels
          uses: PyO3/maturin-action@v1
          env:
            PKG_CONFIG_ALLOW_CROSS: 1
            PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1
          with:
            target: ${{ matrix.platform.target }}
            # 👈 FIXED: Added '--env PKG_CONFIG_ALLOW_CROSS' to args
            # This forces maturin to pass the variable from the Runner into the Docker Container
            args: --release --out dist --find-interpreter --env PKG_CONFIG_ALLOW_CROSS
            sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
            manylinux: auto
            before-script-linux: |
              # Install required headers (keep this, it is correct)
              if command -v apt-get &> /dev/null; then
                apt-get update && apt-get install -y libdbus-1-dev pkg-config libudev-dev
              elif command -v yum &> /dev/null; then
                yum check-update || true
                yum install -y dbus-devel pkgconfig libudev-devel systemd-devel
              elif command -v dnf &> /dev/null; then
                dnf install -y dbus-devel pkgconfig libudev-devel systemd-devel
              else
                echo "Could not detect package manager"
                exit 1
              fi

        - name: Upload wheels
          uses: actions/upload-artifact@v4
          with:
            name: wheels-linux-${{ matrix.platform.target }}
            path: dist

  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
    steps:
      - uses: actions/checkout@v4

      # NEW: Required for musllinux builds on foreign arches (armv7/aarch64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: musllinux_1_2
          before-script-linux: |
            if command -v apk &> /dev/null; then
              apk add dbus-dev pkgconf
            elif command -v apt-get &> /dev/null; then
              apt-get update && apt-get install -y libdbus-1-dev pkg-config
            else
              echo "Could not detect package manager"
              exit 1
            fi

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  # ... (Keep windows, macos, and sdist jobs exactly the same)
  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
          - runner: windows-latest
            target: x86
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
          architecture: ${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-13
            target: x86_64
          - runner: macos-14
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist
